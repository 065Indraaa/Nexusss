<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/nexus-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS AI — Multi-Role Dev Platform</title>
    <script>
      const originalFetchDescriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
      if (originalFetchDescriptor && !originalFetchDescriptor.set) {
        let fetchValue = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => fetchValue,
            set: (v) => { fetchValue = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not polyfill fetch setter:', e);
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
